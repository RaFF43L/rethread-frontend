<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F5F1E8"/>
  
  <!-- Ícone de imagem -->
  <g transform="translate(100, 100)">
    <!-- Frame -->
    <rect x="20" y="20" width="160" height="160" fill="none" stroke="#D4988C" stroke-width="4" rx="8"/>
    
    <!-- Montanhas -->
    <path d="M 40 140 L 70 100 L 100 140 Z" fill="#8B9D7C" opacity="0.6"/>
    <path d="M 85 140 L 120 90 L 155 140 Z" fill="#8B9D7C" opacity="0.8"/>
    
    <!-- Sol -->
    <circle cx="140" cy="60" r="15" fill="#D4988C" opacity="0.7"/>
  </g>
  
  <!-- Texto -->
  <text x="200" y="280" font-family="sans-serif" font-size="16" fill="#9CA3AF" text-anchor="middle">
    Imagem
  </text>
  <text x="200" y="300" font-family="sans-serif" font-size="16" fill="#9CA3AF" text-anchor="middle">
    Indisponível
  </text>
</svg>
