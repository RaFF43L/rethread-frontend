<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#F5F1E8"/>
  <!-- Cabide estilizado -->
  <path d="M400 120 C400 120, 400 140, 400 140" stroke="#D4988C" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="400" cy="120" r="12" fill="#D4988C"/>
  
  <!-- Arco laranja/coral -->
  <path d="M 320 180 Q 280 240, 280 340 Q 280 450, 360 520" stroke="#E5AFA6" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 340 180 Q 300 240, 300 340 Q 300 440, 370 510" stroke="#D4988C" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Arco verde oliva -->
  <path d="M 480 180 Q 520 240, 520 340 Q 520 450, 440 520" stroke="#8B9D7C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 460 180 Q 500 240, 500 340 Q 500 440, 430 510" stroke="#A4B896" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Círculo central com texto -->
  <circle cx="400" cy="380" r="180" fill="none" stroke="#D4A89C" stroke-width="4"/>
  <circle cx="400" cy="380" r="175" fill="none" stroke="#C89886" stroke-width="2"/>
  
  <!-- Texto Segunda -->
  <text x="400" y="340" font-family="serif" font-size="48" fill="#C37D6F" text-anchor="middle" font-weight="300">Segunda</text>
  
  <!-- Texto Aura (maior) -->
  <text x="400" y="410" font-family="serif" font-size="96" fill="#D4988C" text-anchor="middle" font-weight="bold">Aura</text>
  
  <!-- Texto BRECHÓ -->
  <text x="400" y="465" font-family="sans-serif" font-size="32" fill="#8B9D7C" text-anchor="middle" font-weight="400" letter-spacing="4">BRECHÓ</text>
</svg>
